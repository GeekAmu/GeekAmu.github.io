name: Deploy GeekAmu Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/geekamu-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/geekamu-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production

      - name: Add CNAME
        run: echo "geekamu.com" > dist/geekamu-web/browser/CNAME

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/geekamu-web/dist/geekamu-web/browser

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
